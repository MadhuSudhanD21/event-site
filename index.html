<!DOCTYPE html>
<html>
<head>
    <title>Car Race Invitation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, black, red);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .card {
            background-color: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 0 20px red;
        }

        h1 {
            color: red;
        }

        input {
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: none;
            width: 80%;
        }

        .btn {
            background: red;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: darkred;
        }

        #formBox {
            display: none; /* hidden initially */
            margin-top: 15px;
        }

        #message {
            color: lightgreen;
        }
        img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="https://cdn.pixabay.com/photo/2019/08/09/06/12/car-racing-4394450_1280.jpg" alt="Racing Image">

        <h1>🏎️ GRAND CAR RACE 2026</h1>

        <p>You are invited to the most thrilling car race event!</p>

        <p>📅 Date: April 20, 2026</p>
        <p>📍 Location: Bangalore Race Track</p>
        <p>⏰ Time: 5:00 PM</p>

        <button class="btn" onclick="showForm()">Register Now</button>

        <div id="formBox">
            <h3>Register</h3>

            <form onsubmit="submitForm(event)">
                <input type="text" placeholder="Enter your name" required><br>
                <input type="email" placeholder="Enter your email" required><br>
                <input type="tel" placeholder="Enter your phone" required><br>

                <button class="btn" type="submit">Submit</button>
            </form>
        </div>

        <p id="message"></p>
    </div>

    <script>
        function showForm() {
            document.getElementById("formBox").style.display = "block";
        }

        function submitForm(event) {
            event.preventDefault();
            document.getElementById("message").innerHTML =
                "✅ Registration Successful!";
        }
    </script>

</body>
</html>
