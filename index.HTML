<!DOCTYPE html>
<html>
<head>
    <title>Car Race Invitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, black, red);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .card {
            background-color: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 0 20px red;
        }

        h1 {
            color: red;
            font-size: 40px;
        }

        p {
            font-size: 18px;
        }

        .btn {
            background: red;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn:hover {
            background: darkred;
        }

        img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="https://cdn.pixabay.com/photo/2019/08/09/06/12/car-racing-4394450_1280.jpg" alt="Racing Image">
        <h1>🏎️ GRAND CAR RACE 2026</h1>
        <p>You are invited to the most thrilling car race event!</p>

        <p><strong>📅 Date:</strong> April 20, 2026</p>
        <p><strong>📍 Location:</strong> Bangalore Race Track</p>
        <p><strong>⏰ Time:</strong> 5:00 PM</p>

        <p>Experience speed, power, and excitement like never before!</p>

        <button class="btn">Register Now</button>
    </div>

</body>
</html>
